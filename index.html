<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0f0f0f">
<title>Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0f0f0f;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input,textarea{font-family:inherit;}
:root{
  --card:#1c1c1c;--surface:#262626;--surface2:#2e2e2e;
  --text:#e8e8e8;--muted:#888;--hint:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.18);--accent-text:#a5b4fc;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.15);
  --r:12px;--rs:8px;
}
#app{max-width:480px;margin:0 auto;padding:0 0 76px;}
.screen{padding:16px;}
.hidden{display:none!important;}
h1{font-size:20px;font-weight:600;}
h2{font-size:17px;font-weight:600;}
h3{font-size:15px;font-weight:500;}
.muted{color:var(--muted);font-size:13px;}
.hint{color:var(--hint);font-size:12px;}
.card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden;}
.cp{padding:14px 16px;}
.div{height:0.5px;background:var(--border);}
.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:var(--rs);background:transparent;color:var(--text);font-size:13px;font-family:inherit;padding:7px 12px;cursor:pointer;min-height:36px;}
.btn:active{opacity:0.65;}
.btn-p{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);}
.btn-d{color:#f87171;border-color:rgba(248,113,113,0.3);}
.btn-s{padding:4px 9px;font-size:12px;min-height:28px;}
.btn-w{width:100%;margin-top:8px;}
/* nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:0.5px solid var(--border);display:flex;justify-content:center;}
#nav-inner{display:flex;width:100%;max-width:480px;}
#nav-inner button{flex:1;background:none;border:none;color:var(--hint);font-size:11px;font-family:inherit;padding:10px 0 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
#nav-inner button.active{color:var(--accent);}
#nav-inner button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* calendar */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:11px;color:var(--hint);padding:4px 0;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;gap:1px;user-select:none;position:relative;}
.cal-cell:active{opacity:0.6;}
.cal-cell.today{border:1.5px solid var(--accent);}
.cal-cell.sel{background:var(--accent-bg);}
.cal-num{font-size:13px;line-height:1;}
.cal-cell.sel .cal-num{color:var(--accent-text);font-weight:500;}
.dot{width:5px;height:5px;border-radius:50%;}
.cal-chk{position:absolute;top:2px;right:3px;font-size:8px;color:var(--green);}
.day-card{margin-top:12px;}
.day-lbl{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.dot-lg{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cond-txt{font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px;}
.wk-badge{margin-left:auto;background:var(--surface);border-radius:99px;padding:2px 8px;font-size:11px;color:var(--hint);}
/* workout */
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.pair-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:6px;padding-left:2px;}
.pair-blk{margin-bottom:16px;}
.ex-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ex-name{font-size:15px;font-weight:500;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);flex:1;outline:none;min-width:0;}
.ex-name:focus{border-bottom-color:var(--border2);}
.rep-tgt{font-size:11px;color:var(--hint);flex-shrink:0;}
.set-row{display:flex;align-items:center;gap:5px;padding:7px 8px;border-radius:var(--rs);background:var(--surface);margin-bottom:4px;}
.set-row.done{background:var(--green-bg);}
.set-n{font-size:11px;color:var(--hint);width:14px;text-align:center;flex-shrink:0;}
.s-inp{width:58px;background:var(--surface2);border:none;border-radius:6px;padding:7px 4px;font-size:14px;text-align:center;color:var(--text);outline:none;}
.s-inp:focus{background:#333;}
.set-x{font-size:11px;color:var(--hint);flex-shrink:0;}
.n-inp{flex:1;background:var(--surface2);border:none;border-radius:6px;padding:7px 8px;font-size:12px;color:var(--muted);font-family:inherit;outline:none;min-width:0;}
.n-inp:focus{background:#333;color:var(--text);}
.done-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;color:var(--hint);font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.done-btn.done{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.set-acts{display:flex;gap:12px;margin-top:5px;}
.set-acts button{background:none;border:none;font-size:12px;cursor:pointer;padding:2px 0;font-family:inherit;color:var(--muted);}
.set-acts .rem{color:var(--hint);}
/* cardio */
.cardio-done-btn{width:56px;height:56px;border-radius:50%;border:2px solid var(--border2);background:transparent;color:var(--hint);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cardio-done-btn.done{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.cardio-notes{width:100%;background:var(--surface);border:none;border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--text);resize:none;outline:none;min-height:80px;line-height:1.5;}
.cardio-notes:focus{background:var(--surface2);}
/* modal */
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:1rem;}
.m-box{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:68vh;overflow-y:auto;padding:18px;}
.m-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.h-entry{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border);}
.h-entry:last-child{border-bottom:none;margin-bottom:0;}
.h-date{font-size:11px;color:var(--hint);margin-bottom:6px;}
.h-set{font-size:13px;color:var(--muted);padding:2px 0;}
.h-set .v{color:var(--text);}
/* settings */
.s-sec{margin-bottom:24px;}
.s-ttl{font-size:11px;font-weight:600;color:var(--hint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.code-block{background:var(--surface);border-radius:var(--rs);padding:10px 12px;font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);line-height:1.8;overflow-x:auto;white-space:pre;}
.date-inp{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 12px;font-size:14px;color:var(--text);width:100%;margin-top:8px;outline:none;}
.date-inp:focus{border-color:var(--accent);}
/* daily */
.daily-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.daily-hd > button:disabled{opacity:0.3;cursor:default;}
.w-inp{background:var(--surface2);border:none;border-radius:8px;padding:10px 14px;font-size:20px;font-weight:500;color:var(--text);width:110px;outline:none;text-align:center;}
.w-inp:focus{background:#333;}
.affect-grid{
  position:relative;aspect-ratio:1;width:100%;max-width:300px;margin:0 auto;
  background-color:var(--surface);border-radius:var(--rs);cursor:crosshair;user-select:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size:12.5% 12.5%;
}
.affect-grid::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.08);pointer-events:none;}
.affect-grid::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.08);pointer-events:none;}
.affect-dot{
  position:absolute;width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2.5px solid #fff;
  transform:translate(-50%,-50%);pointer-events:none;
  box-shadow:0 2px 8px rgba(99,102,241,0.5);
  transition:left .15s ease,top .15s ease;
}
.affect-axis-v{text-align:center;font-size:10px;color:var(--hint);letter-spacing:.04em;}
.affect-axis-h{display:flex;justify-content:space-between;font-size:10px;color:var(--hint);letter-spacing:.04em;margin-top:5px;}
.section-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px;}
.section-hd:active{opacity:0.7;}
.chev{color:var(--hint);font-size:14px;flex-shrink:0;transition:transform .15s;}
.chev.open{transform:rotate(180deg);}
.scale-ref{display:flex;gap:10px;flex-wrap:wrap;padding:9px 14px;background:rgba(255,255,255,0.02);font-size:11px;color:var(--muted);}
.scale-ref strong{color:var(--text);font-weight:600;margin-right:3px;}
.q-row{padding:11px 14px;border-top:0.5px solid var(--border);}
.q-text{font-size:13px;line-height:1.45;color:var(--text);}
.q-opts{display:flex;gap:6px;margin-top:9px;}
.q-opt{flex:1;padding:9px 0;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.q-opt.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);}
.q-opt:active{opacity:0.7;}
.q9-alert{margin:0 14px 14px;padding:11px 13px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:var(--rs);font-size:12px;line-height:1.55;color:#fca5a5;}
.q9-alert strong{color:#fecaca;}
.spark{max-width:100%;height:auto;}
.aff-list{margin-top:14px;border-top:0.5px solid var(--border);padding-top:4px;}
.aff-entry{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.aff-entry:last-child{border-bottom:none;}
.aff-time{color:var(--muted);font-variant-numeric:tabular-nums;min-width:44px;}
.aff-lbl{color:var(--text);flex:1;}
.aff-del{background:none;border:none;color:var(--hint);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;font-family:inherit;}
.aff-del:active{color:#f87171;}
/* data */
.range-seg{display:flex;background:var(--surface);border-radius:var(--rs);padding:3px;margin-bottom:14px;gap:2px;}
.range-seg button{flex:1;background:none;border:none;color:var(--muted);font-size:12px;padding:7px 0;border-radius:6px;cursor:pointer;font-family:inherit;}
.range-seg button.sel{background:var(--card);color:var(--text);}
.stat-ttl{font-size:11px;color:var(--hint);letter-spacing:.03em;text-transform:uppercase;}
.stat-val{font-size:22px;font-weight:500;margin-top:5px;letter-spacing:-0.01em;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.chart{width:100%;height:auto;display:block;margin-top:12px;}
.empty{padding:22px 0;text-align:center;font-size:12px;color:var(--hint);}
.heat-legend{display:flex;gap:6px;margin-top:10px;font-size:11px;color:var(--hint);align-items:center;justify-content:flex-end;}
.heat-legend span.sq{display:inline-block;width:10px;height:10px;border-radius:2px;}
.dot-trail{position:absolute;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);pointer-events:none;}
.dot-trail.latest{border:2px solid #fff;box-shadow:0 2px 8px rgba(99,102,241,0.5);}
.mini-seg{display:inline-flex;background:var(--surface);border-radius:6px;padding:2px;gap:2px;flex-shrink:0;}
.mini-seg button{background:none;border:none;color:var(--muted);font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:inherit;}
.mini-seg button.sel{background:var(--card);color:var(--text);}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:10px;}
.chart-legend span{display:inline-flex;align-items:center;gap:5px;}
.legend-sq{display:inline-block;width:14px;height:3px;border-radius:2px;}
/* urge modal form */
.m-field{margin-bottom:16px;}
.m-field:last-child{margin-bottom:0;}
.field-ttl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.field-hint{font-weight:400;color:var(--hint);letter-spacing:0;text-transform:none;margin-left:6px;}
.seg{display:flex;gap:5px;}
.seg button{flex:1;padding:10px 4px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.seg button.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 11px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;user-select:none;}
.chip.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);}
.chip.dis{opacity:0.35;cursor:default;}
.time-inp{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:15px;color:var(--text);outline:none;min-width:120px;font-family:inherit;}
.time-inp:focus{border-color:var(--accent);}
.note-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--text);resize:none;outline:none;min-height:60px;line-height:1.5;font-family:inherit;}
.note-inp:focus{border-color:var(--accent);}
/* urge list on Daily */
.urge-entry{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:12px;cursor:pointer;}
.urge-entry:last-child{border-bottom:none;}
.urge-entry:active{background:rgba(255,255,255,0.02);}
.urge-time{color:var(--muted);font-variant-numeric:tabular-nums;min-width:44px;flex-shrink:0;}
.urge-int{font-size:11px;color:var(--hint);min-width:44px;flex-shrink:0;}
.urge-act{color:var(--text);min-width:56px;flex-shrink:0;}
.urge-tag{color:var(--muted);font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.time-chips{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.chip-sm{padding:4px 10px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;}
.chip-sm:active{background:var(--surface2);color:var(--text);}
/* urge data */
.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-grid-3 > div{min-width:0;}
.stat-unit{font-size:14px;color:var(--muted);margin-left:2px;font-weight:400;}
.tag-bar{display:flex;align-items:center;gap:10px;margin-bottom:5px;font-size:12px;}
.tag-bar-lbl{color:var(--text);min-width:100px;flex-shrink:0;}
.tag-bar-bg{flex:1;height:6px;background:var(--surface);border-radius:3px;overflow:hidden;}
.tag-bar-fill{height:100%;background:var(--accent);opacity:0.55;}
.tag-bar-n{color:var(--muted);font-variant-numeric:tabular-nums;min-width:24px;text-align:right;}
.sub-ttl{font-size:11px;color:var(--hint);letter-spacing:.03em;text-transform:uppercase;margin:14px 0 8px;}
.sub-ttl:first-child{margin-top:0;}
</style>
</head>
<body>
<div id="app">
  <div id="screen-calendar" class="screen hidden"></div>
  <div id="screen-workout"  class="screen hidden"></div>
  <div id="screen-cardio"   class="screen hidden"></div>
  <div id="screen-daily"    class="screen hidden"></div>
  <div id="screen-data"     class="screen hidden"></div>
  <div id="screen-settings" class="screen hidden"></div>
  <div id="modal-history"   class="m-overlay hidden"></div>
  <div id="modal-urge"      class="m-overlay hidden"></div>
  <nav id="nav"><div id="nav-inner">
    <button id="nb-cal" onclick="showScreen('calendar')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar
    </button>
    <button id="nb-today" onclick="goToday()">
      <svg viewBox="0 0 24 24"><line x1="7" y1="12" x2="17" y2="12"/><rect x="2" y="8" width="4" height="8" rx="1"/><rect x="18" y="8" width="4" height="8" rx="1"/></svg>Train
    </button>
    <button id="nb-daily" onclick="showScreen('daily')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Daily
    </button>
    <button id="nb-data" onclick="showScreen('data')">
      <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/></svg>Data
    </button>
    <button id="nb-set" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
    </button>
  </div></nav>
</div>
<script>
// ── Default program ──────────────────────────────────────────────────────
const DEFAULT_PROGRAM = [
  {type:'lift',week:1,day:'Monday',   pair:'A',slot:1,exercise:'Leg Press',                sets:2,reps_target:'8-10'},
  {type:'lift',week:1,day:'Monday',   pair:'A',slot:2,exercise:'Cable Row',                sets:2,reps_target:'10-12'},
  {type:'lift',week:1,day:'Monday',   pair:'B',slot:1,exercise:'Leg Extension',            sets:2,reps_target:'12'},
  {type:'lift',week:1,day:'Monday',   pair:'B',slot:2,exercise:'Incline Machine Press',    sets:2,reps_target:'10'},
  {type:'lift',week:1,day:'Monday',   pair:'C',slot:1,exercise:'Cable Lateral Raise',      sets:2,reps_target:'15'},
  {type:'lift',week:1,day:'Monday',   pair:'C',slot:2,exercise:'Incline DB Curl',          sets:2,reps_target:'12'},
  {type:'lift',week:1,day:'Wednesday',pair:'A',slot:1,exercise:'Seated Leg Curl',          sets:2,reps_target:'10-12'},
  {type:'lift',week:1,day:'Wednesday',pair:'A',slot:2,exercise:'Lat Pulldown',             sets:2,reps_target:'8-10'},
  {type:'lift',week:1,day:'Wednesday',pair:'B',slot:1,exercise:'Single-Leg RDL',           sets:2,reps_target:'8 each'},
  {type:'lift',week:1,day:'Wednesday',pair:'B',slot:2,exercise:'Landmine Press',           sets:2,reps_target:'10'},
  {type:'lift',week:1,day:'Wednesday',pair:'C',slot:1,exercise:'Standing Calf Raise',      sets:2,reps_target:'15'},
  {type:'lift',week:1,day:'Wednesday',pair:'C',slot:2,exercise:'Face Pull',                sets:2,reps_target:'15'},
  {type:'lift',week:1,day:'Friday',   pair:'A',slot:1,exercise:'Hack Squat',               sets:2,reps_target:'8-10'},
  {type:'lift',week:1,day:'Friday',   pair:'A',slot:2,exercise:'Seal Row',                 sets:2,reps_target:'10'},
  {type:'lift',week:1,day:'Friday',   pair:'B',slot:1,exercise:'Pec Deck',                 sets:2,reps_target:'12'},

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── Storage ──────────────────────────────────────────────────────────────
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn(e);}},
  keys(p){return Object.keys(localStorage).filter(k=>k.startsWith(p));},
  del(k){try{localStorage.removeItem(k);}catch{}},
};

// ── State ────────────────────────────────────────────────────────────────
const S={
  screen:'calendar',
  program:LS.get('t:prog')||DEFAULT_PROGRAM,
  startDate:LS.get('t:start')||fmtDate(new Date()),
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(),
  selDate:fmtDate(new Date()),
  workout:{},workoutDate:null,cardioDate:null,
  dailyDate:fmtDate(new Date()),phqExpand:undefined,gadExpand:undefined,
  dataRange:30,affectView:'grid',urgeModal:null,
  weekStart:(LS.get('t:week-start')??0),
};

// ── Utils ────────────────────────────────────────────────────────────────
function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function parseD(s){return new Date(s+'T12:00:00');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── Week logic ───────────────────────────────────────────────────────────
function getNumWeeks(){return Math.max(1,...S.program.map(e=>parseInt(e.week)||1));}

function getWeekNum(date){
  if(!S.startDate)return 1;
  const diff=Math.floor((date-parseD(S.startDate))/86400000);
  if(diff<0)return 1;
  return(Math.floor(diff/7)%getNumWeeks())+1;
}

function getDayType(date){
  const week=getWeekNum(date),dayName=DAYS[date.getDay()];
  const entries=S.program.filter(e=>e.day===dayName&&(parseInt(e.week)||1)===week);
  if(!entries.length)return null;
  const f=entries[0];
  if(f.type==='cardio')return{type:'cardio',label:f.label,color:CARDIO_COLORS[f.category]||'#888',desc:f.notes,category:f.category};
  return{type:'lift',label:'Lift',color:'#6366f1'};
}

// ── Workout helpers ──────────────────────────────────────────────────────
function initWorkout(dayName,week){
  const data={sessionDone:false,sessionNotes:''};
  S.program.filter(e=>e.type==='lift'&&e.day===dayName&&(parseInt(e.week)||1)===week).forEach(e=>{
    data[e.exercise]={key:e.exercise,displayName:e.exercise,pair:e.pair,slot:e.slot,
      repsTarget:e.reps_target,sets:Array.from({length:e.sets},()=>({weight:'',reps:'',notes:'',done:false}))};
  });
  return data;
}

function loadWorkout(ds){
  return LS.get('t:log:'+ds)||initWorkout(DAYS[parseD(ds).getDay()],getWeekNum(parseD(ds)));
}
function saveWorkout(){if(S.workoutDate){LS.set('t:log:'+S.workoutDate,S.workout);scheduleGistPush();}}

function getPairs(){
  const map={};
  Object.values(S.workout).filter(e=>e&&typeof e==='object'&&e.pair!=null).forEach(e=>{if(!map[e.pair])map[e.pair]=[];map[e.pair][e.slot-1]=e;});
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
}

// ── CSV ──────────────────────────────────────────────────────────────────
function parseCSVLine(line){
  const out=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'&&!inQ)inQ=true;
    else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(c===','&&!inQ){out.push(cur.trim());cur='';}
    else cur+=c;
  }
  out.push(cur.trim());return out;
}
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=parseCSVLine(line);
    const o={};hdrs.forEach((h,i)=>o[h]=vals[i]||'');
    if(o.week!==undefined)o.week=parseInt(o.week)||1;
    if(o.sets!==undefined)o.sets=parseInt(o.sets)||2;
    if(o.slot!==undefined)o.slot=parseInt(o.slot)||1;
    return o;
  });
}
function csvQ(s){s=String(s==null?'':s);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}
function toCSV(p){
  const h='type,week,day,pair,slot,exercise,sets,reps_target,category,label,notes';
  return[h,...p.map(e=>{
    if(e.type==='lift')return[csvQ('lift'),csvQ(e.week||1),csvQ(e.day),csvQ(e.pair),csvQ(e.slot),csvQ(e.exercise),csvQ(e.sets),csvQ(e.reps_target),'','',''].join(',');
    return[csvQ('cardio'),csvQ(e.week||1),csvQ(e.day),'','','','','',csvQ(e.category),csvQ(e.label),csvQ(e.notes)].join(',');
  })].join('\n');
}
function download(content,name,type){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();
}

function showScreen(name){

  document.querySelectorAll('#nav-inner button').forEach(b=>b.classList.remove('active'));

}

// ── Calendar ─────────────────────────────────────────────────────────────
function renderCalendar(){
  const el=document.getElementById('screen-calendar');
  const today=fmtDate(new Date());
  const monthName=new Date(S.calYear,S.calMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(S.calYear,S.calMonth,1);
  const last=new Date(S.calYear,S.calMonth+1,0);
  const ws=S.weekStart||0;
  const cells=[];
  const leadingEmpty=(first.getDay()-ws+7)%7;
  for(let i=0;i<leadingEmpty;i++)cells.push('<div></div>');
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(S.calYear,S.calMonth,d),ds=fmtDate(date);
    const dt=getDayType(date);
    const isSel=ds===S.selDate,isToday=ds===today&&!isSel;
    const liftLog=LS.get('t:log:'+ds);
    const cardioLog=LS.get('t:clog:'+ds);
    const done=!!(liftLog&&liftLog.sessionDone)||(!!cardioLog&&cardioLog.done===true);
    const cls='cal-cell'+(isSel?' sel':'')+(isToday?' today':'');
    const dotColor=isSel?'rgba(165,180,252,0.6)':dt?.color;
    cells.push(`<div class="${cls}" onclick="selectDate('${ds}')">
      ${done?'<span class="cal-chk">✓</span>':''}
      <span class="cal-num">${d}</span>
      ${dt?`<div class="dot" style="background:${dotColor}"></div>`:''}
    </div>`);
  }
  const selD=parseD(S.selDate),selDT=getDayType(selD);
  const weekNum=getWeekNum(selD);
  const labelStr=selD.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

  // Wellbeing summary for selected date
  const selDaily=getDaily(S.selDate);
  const selUrges=getUrges(S.selDate);
  const wbParts=[];
  if(selDaily.weight!==''&&selDaily.weight!=null)wbParts.push(`${selDaily.weight} lb`);
  if(selDaily.affect&&selDaily.affect.length)wbParts.push(`${selDaily.affect.length} affect`);
  const selPhqAns=selDaily.phq9.filter(x=>x!=null).length;
  if(selPhqAns>=5){
    const sc=selDaily.phq9.reduce((a,b)=>a+(b||0),0);
    const pb=phqBand(sc);
    wbParts.push(`<span style="color:${pb.color}">PHQ ${sc}</span>`);
  }
  const selGadAns=selDaily.gad7.filter(x=>x!=null).length;
  if(selGadAns>=4){
    const sc=selDaily.gad7.reduce((a,b)=>a+(b||0),0);
    const gb=gadBand(sc);
    wbParts.push(`<span style="color:${gb.color}">GAD ${sc}</span>`);
  }
  if(selUrges.length)wbParts.push(`${selUrges.length} urge${selUrges.length!==1?'s':''}`);
  const wbSummary=wbParts.length
    ?`<div class="muted" style="font-size:12px;line-height:1.6;margin-top:14px">${wbParts.join(' \u00b7 ')}</div>`
    :'';
  const openDailyBtn=`<button class="btn" style="width:100%;margin-top:10px" onclick="openDailyAt('${S.selDate}')">Open Daily &rarr;</button>`;

  let dayInfo='';
  if(selDT){
    dayInfo=`<div class="day-lbl">
      <div class="dot-lg" style="background:${selDT.color}"></div>
      <h3>${selDT.label}</h3><span class="wk-badge">Week ${weekNum}</span>
    </div>
    ${selDT.desc?`<p class="cond-txt">${selDT.desc}</p>`:''}
    <button class="btn btn-p" style="margin-top:12px;width:100%" onclick="openDay('${S.selDate}')">
      ${selDT.type==='lift'?'Open workout →':'Log session →'}
    </button>
    ${wbSummary}
    ${openDailyBtn}`;
  }else{
    dayInfo=`<div class="day-lbl"><span class="muted">Rest day</span><span class="wk-badge">Week ${weekNum}</span></div>
    ${wbSummary}
    ${openDailyBtn}`;
  }
  el.innerHTML=`
    <div style="margin-bottom:18px"><h1>Training</h1></div>
    <div class="cal-hd">
      <button class="btn btn-s" onclick="prevMonth()">&#8249;</button>
      <span style="font-size:15px;font-weight:500">${monthName}</span>
      <button class="btn btn-s" onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid" style="margin-bottom:3px">
      ${(()=>{const all=['Su','Mo','Tu','We','Th','Fr','Sa'];const ord=[...all.slice(ws),...all.slice(0,ws)];return ord.map(d=>`<div class="cal-dow">${d}</div>`).join('');})()}
    </div>
    <div class="cal-grid">${cells.join('')}</div>
    <div class="card day-card cp">
      <div class="hint" style="margin-bottom:6px">${labelStr}</div>
      ${dayInfo}
    </div>`;
}

function nextMonth(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;renderCalendar();}

function updSet(key,si,field,val){if(!S.workout[key])return;S.workout[key].sets[si][field]=val;saveWorkout();}

function addSet(key){
  if(!S.workout[key])return;

function remSet(key){if(!S.workout[key]||S.workout[key].sets.length<=1)return;S.workout[key].sets.pop();saveWorkout();renderWorkout();}
function updName(key,name){if(!S.workout[key])return;S.workout[key].displayName=name;saveWorkout();}

      <button class="btn btn-w" onclick="doBackup()">Backup all data (JSON)</button>
      <button class="btn btn-w" onclick="document.getElementById('f-json').click()">Restore from backup</button>
      <input id="f-json" type="file" accept=".json" style="display:none" onchange="doRestore(event)">
    </div>

}
function setStartDate(ds){S.startDate=ds;LS.set('t:start',ds);renderSettings();}
function setWeekStart(n){S.weekStart=n;LS.set('t:week-start',n);renderSettings();}
function impCSV(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=parseCSV(ev.target.result);S.program=p;LS.set('t:prog',p);
      alert(`Imported: ${p.filter(x=>x.type==='lift').length} lift + ${p.filter(x=>x.type==='cardio').length} cardio entries.`);
      renderSettings();
    }catch(err){alert('Could not parse CSV.\n'+err);}
  };r.readAsText(f);e.target.value='';
}
function expCSV(){download(toCSV(S.program),'program.csv','text/csv');}
function doBackup(){
  const data={version:4,program:S.program,startDate:S.startDate,logs:{},clogs:{},dailies:{},urges:{}};
  LS.keys('t:log:').forEach(k=>{data.logs[k]=LS.get(k);});
  LS.keys('t:clog:').forEach(k=>{data.clogs[k]=LS.get(k);});
  LS.keys('t:daily:').forEach(k=>{data.dailies[k]=getDaily(k.replace('t:daily:',''));});
  LS.keys('t:urge:').forEach(k=>{data.urges[k]=LS.get(k);});
  download(JSON.stringify(data,null,2),'training-backup-'+fmtDate(new Date())+'.json','application/json');
}
function doRestore(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.program){S.program=data.program;LS.set('t:prog',data.program);}
      if(data.startDate){S.startDate=data.startDate;LS.set('t:start',data.startDate);}
      if(data.logs)Object.entries(data.logs).forEach(([k,v])=>LS.set(k,v));
      if(data.clogs)Object.entries(data.clogs).forEach(([k,v])=>LS.set(k,v));
      if(data.dailies)Object.entries(data.dailies).forEach(([k,v])=>LS.set(k,v));
      if(data.urges)Object.entries(data.urges).forEach(([k,v])=>LS.set(k,v));
      migrateDailies();
      migrateUrges();
      alert('Restore complete.');renderSettings();
    }catch{alert('Invalid backup file.');}
  };r.readAsText(f);e.target.value='';
}
function clearLogs(){
  if(!confirm('Delete all workout, cardio, daily, and urge logs? Cannot be undone.'))return;
  LS.keys('t:log:').forEach(k=>LS.del(k));
  LS.keys('t:clog:').forEach(k=>LS.del(k));
  LS.keys('t:daily:').forEach(k=>LS.del(k));
  LS.keys('t:urge:').forEach(k=>LS.del(k));
  alert('Logs cleared.');renderSettings();
}

// ── Gist sync ────────────────────────────────────────────────────────────
function gistData(){
  const data={version:4,program:S.program,startDate:S.startDate,logs:{},clogs:{},dailies:{},urges:{}};
  LS.keys('t:log:').forEach(k=>{data.logs[k]=LS.get(k);});
  LS.keys('t:clog:').forEach(k=>{data.clogs[k]=LS.get(k);});
  LS.keys('t:daily:').forEach(k=>{data.dailies[k]=getDaily(k.replace('t:daily:',''));});
  LS.keys('t:urge:').forEach(k=>{data.urges[k]=LS.get(k);});
  return data;
}

async function pushGist(){
  const id=LS.get('t:gist-id'),pat=LS.get('t:gist-pat');
  if(!id||!pat)return;
  try{
    const res=await fetch(`https://api.github.com/gists/${id}`,{
      method:'PATCH',
      headers:{'Authorization':'token '+pat,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'training-data.json':{content:JSON.stringify(gistData())}}})
    });
    if(!res.ok)console.warn('Gist push failed',res.status);
    else updateSyncStatus('Synced '+new Date().toLocaleTimeString());
  }catch(e){console.warn('Gist push error',e);updateSyncStatus('Sync failed');}
}

async function pullGist(){
  const id=LS.get('t:gist-id'),pat=LS.get('t:gist-pat');
  if(!id||!pat)return;
  updateSyncStatus('Syncing\u2026');
  try{
    const res=await fetch(`https://api.github.com/gists/${id}`,{
      headers:{'Authorization':'token '+pat}
    });
    if(!res.ok){updateSyncStatus('Sync failed ('+res.status+')');return;}
    const json=await res.json();
    const content=json.files?.['training-data.json']?.content;
    if(!content){updateSyncStatus('No data in gist yet');return;}
    const data=JSON.parse(content);
    if(data.program){S.program=data.program;LS.set('t:prog',data.program);}
    if(data.startDate){S.startDate=data.startDate;LS.set('t:start',data.startDate);}
    if(data.logs)Object.entries(data.logs).forEach(([k,v])=>LS.set(k,v));
    if(data.clogs)Object.entries(data.clogs).forEach(([k,v])=>LS.set(k,v));
    if(data.dailies)Object.entries(data.dailies).forEach(([k,v])=>LS.set(k,v));
    if(data.urges)Object.entries(data.urges).forEach(([k,v])=>LS.set(k,v));
    migrateDailies();
    migrateUrges();
    updateSyncStatus('Pulled '+new Date().toLocaleTimeString());
    if(S.screen==='calendar')renderCalendar();
    if(S.screen==='daily')renderDaily();
  }catch(e){console.warn('Gist pull error',e);updateSyncStatus('Sync failed');}
}

function updateSyncStatus(msg){
  const el=document.getElementById('sync-status');
  if(el)el.textContent=msg;
}

let gistTimer=null;
function scheduleGistPush(){
  clearTimeout(gistTimer);
  gistTimer=setTimeout(pushGist,3000);
}

// ── Daily screen ─────────────────────────────────────────────────────────
const PHQ9=[
  "Little interest or pleasure in doing things",
  "Feeling down, depressed, or hopeless",
  "Trouble falling or staying asleep, or sleeping too much",
  "Feeling tired or having little energy",
  "Poor appetite or overeating",
  "Feeling bad about yourself \u2014 or that you are a failure or have let yourself or your family down",
  "Trouble concentrating on things, such as reading or watching television",
  "Moving or speaking so slowly others could have noticed \u2014 or the opposite, being so fidgety/restless you've been moving around more than usual",
  "Thoughts that you would be better off dead, or of hurting yourself"
];
const GAD7=[
  "Feeling nervous, anxious, or on edge",
  "Not being able to stop or control worrying",
  "Worrying too much about different things",
  "Trouble relaxing",
  "Being so restless that it's hard to sit still",
  "Becoming easily annoyed or irritable",
  "Feeling afraid, as if something awful might happen"
];
const SCALE_LBL=["Not at all","A little","Moderately","Severely"];

function phqBand(s){
  if(s<=4)return{label:'minimal',color:'#22c55e'};
  if(s<=9)return{label:'mild',color:'#84cc16'};
  if(s<=14)return{label:'moderate',color:'#eab308'};
  if(s<=19)return{label:'moderately severe',color:'#f97316'};
  return{label:'severe',color:'#ef4444'};
}
function gadBand(s){
  if(s<=4)return{label:'minimal',color:'#22c55e'};
  if(s<=9)return{label:'mild',color:'#84cc16'};
  if(s<=14)return{label:'moderate',color:'#eab308'};
  return{label:'severe',color:'#ef4444'};
}
function sumArr(a){return a.reduce((x,y)=>x+(y||0),0);}

function getDaily(ds){
  const raw=LS.get('t:daily:'+ds);
  if(!raw)return{
    date:ds,weight:'',affect:[],
    phq9:Array(9).fill(null),gad7:Array(7).fill(null)
  };
  // Migrate old affect format (single object -> array)
  if(raw.affect&&!Array.isArray(raw.affect)&&raw.affect.valence!=null){
    raw.affect=[{valence:raw.affect.valence,arousal:raw.affect.arousal,ts:raw.date+'T12:00:00'}];
  }
  if(raw.affect==null)raw.affect=[];
  return raw;
}
function saveDaily(d){LS.set('t:daily:'+d.date,d);scheduleGistPush();}

// One-time migration across all daily entries (idempotent)
function migrateDailies(){
  LS.keys('t:daily:').forEach(k=>{
    const raw=LS.get(k);
    if(raw&&raw.affect&&!Array.isArray(raw.affect)&&raw.affect.valence!=null){
      raw.affect=[{valence:raw.affect.valence,arousal:raw.affect.arousal,ts:raw.date+'T12:00:00'}];
      LS.set(k,raw);
    }
  });
}

function affectQuadrant(v,a){
  const dist=Math.sqrt((v-0.5)**2+(a-0.5)**2);
  if(dist<0.08)return'Neutral';
  if(v>=0.5&&a>=0.5)return'Activated / pleasant';
  if(v>=0.5&&a<0.5)return'Calm / pleasant';
  if(v<0.5&&a>=0.5)return'Tense / unpleasant';
  return'Low / unpleasant';
}

function weightEntries(){
  const arr=[];
  LS.keys('t:daily:').sort().forEach(k=>{
    const d=LS.get(k);
    if(d&&d.weight!==''&&d.weight!=null&&!isNaN(parseFloat(d.weight))){
      arr.push({date:k.replace('t:daily:',''),weight:parseFloat(d.weight)});
    }
  });
  return arr;
}
function weightTrend(){
  const e=weightEntries();if(e.length<2)return'';
  const last=e[e.length-1],first=e[Math.max(0,e.length-14)];
  const diff=last.weight-first.weight;
  const days=Math.max(1,Math.round((parseD(last.date)-parseD(first.date))/86400000));
  const sign=diff>0?'+':'';
  return`${sign}${diff.toFixed(1)} lb \u00b7 ${days}d`;
}
function weightSparkline(){
  const e=weightEntries().slice(-30);
  if(e.length<2)return'';
  const ws=e.map(x=>x.weight);
  const min=Math.min(...ws),max=Math.max(...ws),range=(max-min)||1;
  const w=260,h=44;
  const pts=e.map((x,i)=>{
    const px=(i/(e.length-1))*w;
    const py=h-((x.weight-min)/range)*(h-6)-3;
    return`${px.toFixed(1)},${py.toFixed(1)}`;
  }).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" class="spark" preserveAspectRatio="none" style="width:100%;height:${h}px">
    <polyline points="${pts}" fill="none" stroke="var(--accent-text)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderDaily(){
  const el=document.getElementById('screen-daily');
  if(!S.dailyDate)S.dailyDate=fmtDate(new Date());
  const ds=S.dailyDate,today=fmtDate(new Date());
  const d=getDaily(ds);
  const date=parseD(ds);
  const displayDate=date.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const isToday=ds===today,isFuture=ds>today;

  const phqScore=sumArr(d.phq9),gadScore=sumArr(d.gad7);
  const phqAns=d.phq9.filter(x=>x!=null).length;
  const gadAns=d.gad7.filter(x=>x!=null).length;
  const pb=phqBand(phqScore),gb=gadBand(gadScore);

  // Default expand: open if incomplete, closed if done (only on initial load for this date)
  if(S.phqExpand===undefined)S.phqExpand=phqAns<9;
  if(S.gadExpand===undefined)S.gadExpand=gadAns<7;

  const affectEntries=Array.isArray(d.affect)?d.affect:[];
  const latestAffect=affectEntries.length?affectEntries[affectEntries.length-1]:null;
  const affectTxt=latestAffect?affectQuadrant(latestAffect.valence,latestAffect.arousal):'Tap grid to log';
  const affectDots=affectEntries.map((a,i)=>{
    const ax=a.valence*100,ay=(1-a.arousal)*100;
    const isLatest=i===affectEntries.length-1;
    const size=isLatest?14:9;
    const op=isLatest?1:0.5;
    return`<div class="dot-trail${isLatest?' latest':''}" style="left:${ax.toFixed(1)}%;top:${ay.toFixed(1)}%;width:${size}px;height:${size}px;opacity:${op}"></div>`;
  }).join('');
  const affectList=affectEntries.length?`<div class="aff-list">
    ${affectEntries.slice().reverse().map((e,idx)=>{
      const realIdx=affectEntries.length-1-idx;
      const t=new Date(e.ts);
      const timeStr=isNaN(t)?'—':t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
      return`<div class="aff-entry">
        <span class="aff-time">${timeStr}</span>
        <span class="aff-lbl">${affectQuadrant(e.valence,e.arousal)}</span>
        <button class="aff-del" onclick="delAffect(${realIdx})" aria-label="Delete">\u00D7</button>
      </div>`;
    }).join('')}
  </div>`:'';

  const renderQs=(list,answers,setFn)=>list.map((q,i)=>{
    const sel=answers[i];
    const opts=[0,1,2,3].map(v=>
      `<button class="q-opt${sel===v?' sel':''}" onclick="${setFn}(${i},${v})">${v}</button>`
    ).join('');
    return`<div class="q-row">
      <div class="q-text">${i+1}. ${q}</div>
      <div class="q-opts">${opts}</div>
    </div>`;
  }).join('');

  const q9Alert=(d.phq9[8]!=null&&d.phq9[8]>0)
    ?`<div class="q9-alert">If you're having thoughts of harming yourself, support is available any time. In the US &amp; Canada, call or text <strong>988</strong>. You don't have to handle this alone.</div>`
    :'';

  const trend=weightTrend();
  const spark=weightSparkline();

  // Urges for this date
  const urgesToday=getUrges(ds);
  const urgeListHTML=urgesToday.length?`<div class="aff-list" style="margin-top:12px">
    ${urgesToday.slice().reverse().map((u,idx)=>{
      const realIdx=urgesToday.length-1-idx;
      const t=new Date(u.ts);
      const timeStr=isNaN(t)?'\u2014':t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
      const intLbl=URGE_INTENSITY_LBL[Math.max(0,(u.intensity||1)-1)]||'';
      const firstTag=(u.triggers&&u.triggers[0])||(u.feelings&&u.feelings[0])||(u.quality&&u.quality[0])||'';
      return`<div class="urge-entry" onclick="openUrgeModal(${realIdx})">
        <span class="urge-time">${timeStr}</span>
        <span class="urge-int">${intLbl}</span>
        <span class="urge-act">${URGE_ACTION_LBL[u.action]||u.action}</span>
        <span class="urge-tag">${firstTag?esc(firstTag):''}</span>
        <button class="aff-del" onclick="event.stopPropagation();delUrge('${ds}',${realIdx})" aria-label="Delete">\u00D7</button>
      </div>`;
    }).join('')}
  </div>`:'';

  el.innerHTML=`
    <div style="margin-bottom:16px"><h1>Daily</h1></div>

    <div class="daily-hd">
      <button class="btn btn-s" onclick="prevDaily()">&#8249;</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:15px;font-weight:500">${displayDate}</div>
        ${isToday?'<div class="hint" style="margin-top:2px">Today</div>'
                 :`<button class="btn btn-s" onclick="goDaily('${today}')" style="margin-top:5px">Jump to today</button>`}
      </div>
      <button class="btn btn-s" onclick="nextDaily()"${isFuture?' disabled':''}>&#8250;</button>
    </div>

    <!-- Urges -->
    <div class="card" style="margin-bottom:14px">
      <div class="cp">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
          <span class="hint">Urges${urgesToday.length?` \u00b7 ${urgesToday.length} today`:''}</span>
        </div>
        <button class="btn btn-p btn-w" onclick="openUrgeModal()" style="margin-top:0">+ Log urge</button>
        ${urgeListHTML}
      </div>
    </div>

    <!-- Weight -->
    <div class="card" style="margin-bottom:14px">
      <div class="cp">
        <div class="hint" style="margin-bottom:10px">Weight</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <input type="number" class="w-inp" inputmode="decimal" step="0.1" placeholder="\u2014"
            value="${esc(d.weight)}" oninput="setWeight(this.value)">

          ${trend?`<span class="muted" style="font-size:12px;margin-left:auto">${trend}</span>`:''}
        </div>

        <div style="margin:6px 0">
          <div class="affect-grid" onclick="setAffect(event,this)">${affectDots}</div>
        </div>
        <div class="affect-axis-h">
          <span>\u2190 Unpleasant</span><span>Pleasant \u2192</span>
        </div>
        <div class="affect-axis-v" style="margin-top:3px">\u2193 Low energy</div>
        ${affectList}
      </div>
    </div>

    <!-- PHQ-9 -->
    <div class="card" style="margin-bottom:14px">
      <div class="cp section-hd" onclick="togPhq()">

          <div class="hint" style="margin-top:3px">
            ${phqAns}/9 \u00b7 <span style="color:${pb.color}">${phqScore}/27 \u00b7 ${pb.label}</span>
          </div>
        </div>
        <span class="chev${S.phqExpand?' open':''}">\u25BE</span>
      </div>
      ${S.phqExpand?`
        <div class="scale-ref">${SCALE_LBL.map((l,i)=>`<span><strong>${i}</strong>${l}</span>`).join('')}</div>
        ${renderQs(PHQ9,d.phq9,'setPhq')}

      `:''}
    </div>

    <!-- GAD-7 -->
    <div class="card" style="margin-bottom:14px">
      <div class="cp section-hd" onclick="togGad()">

          <div class="hint" style="margin-top:3px">
            ${gadAns}/7 \u00b7 <span style="color:${gb.color}">${gadScore}/21 \u00b7 ${gb.label}</span>
          </div>
        </div>
        <span class="chev${S.gadExpand?' open':''}">\u25BE</span>
      </div>
      ${S.gadExpand?`
        <div class="scale-ref">${SCALE_LBL.map((l,i)=>`<span><strong>${i}</strong>${l}</span>`).join('')}</div>
        ${renderQs(GAD7,d.gad7,'setGad')}
      `:''}
    </div>

    <p class="hint" style="text-align:center;line-height:1.55;margin-top:4px;padding:0 12px">
      PHQ-9 &amp; GAD-7 are validated for 2-week recall. Daily use gives you a personal signal, not a clinical score \u2014 trends matter more than any single day.
    </p>`;
}

function setWeight(v){const d=getDaily(S.dailyDate);d.weight=v;saveDaily(d);}
function setAffect(e,el){
  const rect=el.getBoundingClientRect();
  const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  const y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
  const d=getDaily(S.dailyDate);
  if(!Array.isArray(d.affect))d.affect=[];
  // Timestamp: real now if today, else selected date + current time-of-day
  const today=fmtDate(new Date());
  let ts;
  if(S.dailyDate===today){
    ts=new Date().toISOString();
  }else{
    const now=new Date(),dt=parseD(S.dailyDate);
    dt.setHours(now.getHours(),now.getMinutes(),now.getSeconds(),0);
    ts=dt.toISOString();
  }
  d.affect.push({valence:x,arousal:1-y,ts:ts});
  saveDaily(d);
  renderDaily();
}
function delAffect(idx){
  const d=getDaily(S.dailyDate);
  if(Array.isArray(d.affect)&&d.affect[idx]!=null){
    d.affect.splice(idx,1);
    saveDaily(d);
    renderDaily();
  }
}
function setPhq(i,v){const d=getDaily(S.dailyDate);d.phq9[i]=v;saveDaily(d);renderDaily();}
function setGad(i,v){const d=getDaily(S.dailyDate);d.gad7[i]=v;saveDaily(d);renderDaily();}
function togPhq(){S.phqExpand=!S.phqExpand;renderDaily();}
function togGad(){S.gadExpand=!S.gadExpand;renderDaily();}
function prevDaily(){
  const d=parseD(S.dailyDate);d.setDate(d.getDate()-1);
  S.dailyDate=fmtDate(d);S.phqExpand=undefined;S.gadExpand=undefined;renderDaily();
}
function nextDaily(){
  if(S.dailyDate>=fmtDate(new Date()))return;
  const d=parseD(S.dailyDate);d.setDate(d.getDate()+1);
  S.dailyDate=fmtDate(d);S.phqExpand=undefined;S.gadExpand=undefined;renderDaily();
}
function goDaily(ds){S.dailyDate=ds;S.phqExpand=undefined;S.gadExpand=undefined;renderDaily();}
function openDailyAt(ds){S.dailyDate=ds;S.phqExpand=undefined;S.gadExpand=undefined;showScreen('daily');}

function trendChart(points,opts){
  const{w=300,h=100,minY,maxY,color='var(--accent-text)',bands=null}=opts||{};
  if(points.length<2)return emptyNote();
  const xs=points.map(p=>p.x);
  const xMin=Math.min(...xs),xMax=Math.max(...xs);
  const xRange=Math.max(1,xMax-xMin);
  const ys=points.map(p=>p.y);
  const dataMin=Math.min(...ys),dataMax=Math.max(...ys);
  const pad=(dataMax-dataMin)*0.15||1;
  const yLo=minY!=null?minY:dataMin-pad;
  const yHi=maxY!=null?maxY:dataMax+pad;
  const yRange=Math.max(0.001,yHi-yLo);
  const pX=8,pT=8,pB=8;
  const pW=w-pX*2,pH=h-pT-pB;
  const tX=x=>pX+((x-xMin)/xRange)*pW;
  const tY=y=>pT+pH-((y-yLo)/yRange)*pH;
  let bSvg='';
  if(bands){
    bSvg=bands.map(b=>{
      const y1=tY(Math.min(b.max,yHi));
      const y2=tY(Math.max(b.min,yLo));
      if(y1>=y2)return'';
      return`<rect x="${pX}" y="${y1.toFixed(1)}" width="${pW}" height="${(y2-y1).toFixed(1)}" fill="${b.color}" opacity="0.10"/>`;
    }).join('');
  }
  const pts=points.map(p=>`${tX(p.x).toFixed(1)},${tY(p.y).toFixed(1)}`).join(' ');
  const line=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  const dots=points.map(p=>`<circle cx="${tX(p.x).toFixed(1)}" cy="${tY(p.y).toFixed(1)}" r="2.2" fill="${color}"/>`).join('');
  return`<svg viewBox="0 0 ${w} ${h}" class="chart">${bSvg}${line}${dots}</svg>`;
}

function emptyNote(msg){return`<div class="empty">${msg||'Not enough data in this range yet'}</div>`;}

function affectScatter(points){
  if(!points.length)return emptyNote('No affect entries yet');
  const dots=points.map((p,i)=>{
    const x=p.valence*100;
    const y=(1-p.arousal)*100;
    const age=points.length-1-i;
    const opacity=Math.max(0.2,1-age*0.06);
    const isLatest=i===points.length-1;
    const size=isLatest?14:8;
    return`<div class="dot-trail${isLatest?' latest':''}" style="left:${x.toFixed(1)}%;top:${y.toFixed(1)}%;width:${size}px;height:${size}px;opacity:${opacity.toFixed(2)}"></div>`;
  }).join('');
  return`<div class="affect-axis-v" style="margin-top:4px">\u2191 High energy</div>
    <div style="margin:6px 0">
      <div class="affect-grid" style="cursor:default">${dots}</div>
    </div>
    <div class="affect-axis-h"><span>\u2190 Unpleasant</span><span>Pleasant \u2192</span></div>
    <div class="affect-axis-v" style="margin-top:3px">\u2193 Low energy</div>`;
}

function trainingHeatmap(days){
  const today=new Date();
  today.setHours(0,0,0,0);
  const ws=S.weekStart||0;
  const start=new Date(today.getTime()-(days-1)*86400000);
  const offset=(start.getDay()-ws+7)%7;
  start.setDate(start.getDate()-offset);
  const totalDays=Math.round((today-start)/86400000)+1;
  const weeks=Math.ceil(totalDays/7);
  const cW=11,cH=11,g=3;
  const svgW=weeks*(cW+g)-g,svgH=7*(cH+g)-g;
  const cells=[];
  for(let w=0;w<weeks;w++){
    for(let d=0;d<7;d++){
      const dt=new Date(start.getTime()+(w*7+d)*86400000);
      if(dt>today)continue;
      const ds=fmtDate(dt);
      const L=LS.get('t:log:'+ds),C=LS.get('t:clog:'+ds);
      const lD=L&&L.sessionDone,cD=C&&C.done;
      let op=0;
      if(lD)op+=0.5;
      if(cD)op+=0.5;
      const fill=op>0?'var(--accent)':'var(--surface)';
      const fillOp=op>0?op:1;
      cells.push(`<rect x="${w*(cW+g)}" y="${d*(cH+g)}" width="${cW}" height="${cH}" rx="2" fill="${fill}" opacity="${fillOp}"><title>${ds}${lD?' \u00b7 lift':''}${cD?' \u00b7 cardio':''}</title></rect>`);
    }
  }
  return`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto;display:block">${cells.join('')}</svg>`;
}

function setRange(r){S.dataRange=r;renderData();}
function setAffectView(v){S.affectView=v;renderData();}

function multiLineChart(seriesList,opts){
  const{w=300,h=110,minY=0,maxY=1}=opts||{};
  const valid=seriesList.filter(s=>s.points.length>=2);
  if(!valid.length)return emptyNote();
  const allX=seriesList.flatMap(s=>s.points.map(p=>p.x));
  const xMin=Math.min(...allX),xMax=Math.max(...allX);
  const xRange=Math.max(1,xMax-xMin);
  const yRange=maxY-minY;
  const pX=8,pT=8,pB=8;
  const pW=w-pX*2,pH=h-pT-pB;
  const tX=x=>pX+((x-xMin)/xRange)*pW;
  const tY=y=>pT+pH-((y-minY)/yRange)*pH;
  // Midline at 0.5 for reference
  const midY=tY(0.5).toFixed(1);
  const midLine=`<line x1="${pX}" y1="${midY}" x2="${pX+pW}" y2="${midY}" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="2,3"/>`;
  const svgParts=seriesList.map(s=>{
    if(s.points.length<2)return'';
    const pts=s.points.map(p=>`${tX(p.x).toFixed(1)},${tY(p.y).toFixed(1)}`).join(' ');
    const line=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    const dots=s.points.map(p=>`<circle cx="${tX(p.x).toFixed(1)}" cy="${tY(p.y).toFixed(1)}" r="1.8" fill="${s.color}"/>`).join('');
    return line+dots;
  }).join('');
  return`<svg viewBox="0 0 ${w} ${h}" class="chart">${midLine}${svgParts}</svg>`;
}

function renderData(){
  const el=document.getElementById('screen-data');
  const range=S.dataRange||30;
  const today=new Date();
  today.setHours(23,59,59,999);
  const cutoff=range==='all'?0:today.getTime()-range*86400000;

  // Dailies in range (getDaily migrates old format on read)
  const allD=LS.keys('t:daily:').sort().map(k=>getDaily(k.replace('t:daily:','')));
  const D=allD.filter(d=>parseD(d.date).getTime()>=cutoff);

  // Weight
  const wPts=D.filter(d=>d.weight!==''&&d.weight!=null&&!isNaN(parseFloat(d.weight)))
    .map(d=>({x:parseD(d.date).getTime(),y:parseFloat(d.weight),date:d.date}));
  let wStat='\u2014',wSub='';
  if(wPts.length>=1){
    const last=wPts[wPts.length-1];
    wStat=`${last.y.toFixed(1)} <span style="font-size:13px;color:var(--muted);font-weight:400">lb</span>`;
    if(wPts.length>=2){
      const diff=last.y-wPts[0].y;
      const days=Math.max(1,Math.round((last.x-wPts[0].x)/86400000));
      wSub=`${diff>=0?'+':''}${diff.toFixed(1)} lb over ${days} day${days!==1?'s':''}`;
    }
  }

  // PHQ-9 (at least 5 answered to count)
  const pPts=D.filter(d=>d.phq9.filter(x=>x!=null).length>=5)
    .map(d=>({x:parseD(d.date).getTime(),y:d.phq9.reduce((a,b)=>a+(b||0),0),date:d.date}));
  let pStat='\u2014',pSub='';
  if(pPts.length){
    const last=pPts[pPts.length-1],b=phqBand(last.y);
    pStat=`<span style="color:${b.color}">${last.y}</span> <span style="font-size:13px;color:var(--muted);font-weight:400">/ 27 \u00b7 ${b.label}</span>`;
    if(pPts.length>=3){
      const avg=pPts.reduce((a,b)=>a+b.y,0)/pPts.length;
      pSub=`avg ${avg.toFixed(1)} across ${pPts.length} days`;
    }
  }

  // GAD-7 (at least 4 answered)
  const gPts=D.filter(d=>d.gad7.filter(x=>x!=null).length>=4)
    .map(d=>({x:parseD(d.date).getTime(),y:d.gad7.reduce((a,b)=>a+(b||0),0),date:d.date}));
  let gStat='\u2014',gSub='';
  if(gPts.length){
    const last=gPts[gPts.length-1],b=gadBand(last.y);
    gStat=`<span style="color:${b.color}">${last.y}</span> <span style="font-size:13px;color:var(--muted);font-weight:400">/ 21 \u00b7 ${b.label}</span>`;
    if(gPts.length>=3){
      const avg=gPts.reduce((a,b)=>a+b.y,0)/gPts.length;
      gSub=`avg ${avg.toFixed(1)} across ${gPts.length} days`;
    }
  }

  // Affect (flatten all entries across range, show last 30 by timestamp)
  const allAffect=[];
  D.forEach(d=>{
    if(Array.isArray(d.affect))d.affect.forEach(a=>allAffect.push({...a,date:d.date}));
  });
  allAffect.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
  const affect=allAffect.slice(-30);
  const affectTotal=allAffect.length;

  // Training counts (range-limited)
  const liftN=LS.keys('t:log:').map(k=>k.replace('t:log:','')).filter(ds=>parseD(ds).getTime()>=cutoff)
    .filter(ds=>{const l=LS.get('t:log:'+ds);return l&&l.sessionDone;}).length;
  const cardN=LS.keys('t:clog:').map(k=>k.replace('t:clog:','')).filter(ds=>parseD(ds).getTime()>=cutoff)
    .filter(ds=>{const l=LS.get('t:clog:'+ds);return l&&l.done;}).length;

  // Heatmap uses a longer fixed window
  const heatDays=range==='all'?180:Math.max(range,56);

  // Urges in range
  const allUrges=[];
  LS.keys('t:urge:').sort().forEach(k=>{
    const ds=k.replace('t:urge:','');
    getUrges(ds).forEach(u=>allUrges.push({...u,date:ds}));
  });
  const urges=allUrges.filter(u=>new Date(u.ts).getTime()>=cutoff);
  const uTotal=urges.length;
  const uSurfed=urges.filter(u=>u.action==='surfed').length;
  const uSurfPct=uTotal?Math.round(uSurfed/uTotal*100):0;
  const uAvgInt=uTotal?(urges.reduce((a,u)=>a+(u.intensity||0),0)/uTotal).toFixed(1):'\u2014';
  const tagCounts=(field)=>{
    const m={};
    urges.forEach(u=>(u[field]||[]).forEach(t=>{m[t]=(m[t]||0)+1;}));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  };
  const uTopTrig=tagCounts('triggers');
  const uTopFeel=tagCounts('feelings');
  const uTopQual=tagCounts('quality');
  const uByDay={};
  urges.forEach(u=>{
    const d=u.date;
    if(!uByDay[d])uByDay[d]={surfed:0,acted:0,partial:0,replace:0};
    uByDay[d][u.action]=(uByDay[d][u.action]||0)+1;
  });
  const uByHour=Array(24).fill(0);
  urges.forEach(u=>{
    const h=new Date(u.ts).getHours();
    if(!isNaN(h))uByHour[h]++;
  });

  el.innerHTML=`
    <div style="margin-bottom:16px"><h1>Data</h1></div>
    <div class="range-seg">
      <button class="${range===14?'sel':''}" onclick="setRange(14)">14d</button>
      <button class="${range===30?'sel':''}" onclick="setRange(30)">30d</button>
      <button class="${range===90?'sel':''}" onclick="setRange(90)">90d</button>
      <button class="${range==='all'?'sel':''}" onclick="setRange('all')">All</button>
    </div>

    <!-- Weight -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Weight</div>
      <div class="stat-val">${wStat}</div>
      ${wSub?`<div class="stat-sub">${wSub}</div>`:''}
      ${wPts.length>=2?trendChart(wPts,{color:'var(--accent-text)'}):emptyNote()}
    </div></div>

    <!-- PHQ-9 -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">PHQ-9 \u00b7 Depression</div>
      <div class="stat-val">${pStat}</div>
      ${pSub?`<div class="stat-sub">${pSub}</div>`:''}
      ${pPts.length>=2?trendChart(pPts,{minY:0,maxY:27,bands:PHQ_BANDS,color:'var(--accent-text)'}):emptyNote()}
    </div></div>

    <!-- GAD-7 -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">GAD-7 \u00b7 Anxiety</div>
      <div class="stat-val">${gStat}</div>
      ${gSub?`<div class="stat-sub">${gSub}</div>`:''}
      ${gPts.length>=2?trendChart(gPts,{minY:0,maxY:21,bands:GAD_BANDS,color:'var(--accent-text)'}):emptyNote()}
    </div></div>

    <!-- Affect recent -->
    ${(()=>{
      const view=S.affectView||'grid';
      const C_VAL='#a5b4fc',C_AR='#fbbf24';
      let viz,sub;
      if(view==='grid'){
        sub='Most recent highlighted. Older entries fade.';
        viz=affectScatter(affect);
      }else{
        sub='Valence (pleasantness) and arousal (energy) over time.';
        if(affect.length<2){
          viz=emptyNote('Need at least 2 entries for a timeline');
        }else{
          const vSeries={points:affect.map(a=>({x:new Date(a.ts).getTime(),y:a.valence})),color:C_VAL};
          const aSeries={points:affect.map(a=>({x:new Date(a.ts).getTime(),y:a.arousal})),color:C_AR};
          const first=new Date(affect[0].ts);
          const last=new Date(affect[affect.length-1].ts);
          const fmtO={month:'short',day:'numeric'};
          viz=`<div class="chart-legend">
            <span><span class="legend-sq" style="background:${C_VAL}"></span>Valence</span>
            <span><span class="legend-sq" style="background:${C_AR}"></span>Arousal</span>
          </div>
          ${multiLineChart([vSeries,aSeries],{minY:0,maxY:1})}
          <div class="hint" style="display:flex;justify-content:space-between;font-size:10px;margin-top:4px;padding:0 4px">
            <span>${first.toLocaleDateString('en-US',fmtO)}</span>
            <span>${last.toLocaleDateString('en-US',fmtO)}</span>
          </div>`;
        }
      }
      return`<div class="card" style="margin-bottom:14px"><div class="cp">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
          <div style="flex:1;min-width:0">
            <div class="stat-ttl">Affect \u00b7 ${affect.length}${affectTotal>affect.length?` of ${affectTotal}`:''}</div>
            <div class="stat-sub" style="margin-top:5px">${sub}</div>
          </div>
          <div class="mini-seg">
            <button class="${view==='grid'?'sel':''}" onclick="setAffectView('grid')">Grid</button>
            <button class="${view==='lines'?'sel':''}" onclick="setAffectView('lines')">Lines</button>
          </div>
        </div>
        ${viz}
      </div></div>`;
    })()}

    <!-- Urges -->
    ${uTotal===0?`<div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Urges</div>
      <div class="empty">No urges logged in this range yet</div>
    </div></div>`:`
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Urges</div>
      <div class="stat-grid-3" style="margin-top:10px;margin-bottom:14px">
        <div>
          <div style="font-size:11px;color:var(--hint)">Total</div>
          <div class="stat-val" style="font-size:20px">${uTotal}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--hint)">Surfed</div>
          <div class="stat-val" style="font-size:20px">${uSurfPct}<span class="stat-unit">%</span></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--hint)">Avg intensity</div>
          <div class="stat-val" style="font-size:20px">${uAvgInt}</div>
        </div>
      </div>
      ${stackedBarChart(uByDay,{})}
      <div class="chart-legend" style="flex-wrap:wrap;gap:10px 14px;margin-top:12px">
        ${URGE_ACTIONS.map(a=>`<span><span class="legend-sq" style="background:${URGE_ACTION_COLORS[a]};width:10px;height:10px;border-radius:2px"></span>${URGE_ACTION_LBL[a]}</span>`).join('')}
      </div>
    </div></div>

    <!-- Time of day -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Urges \u00b7 Time of day</div>
      <div class="stat-sub" style="margin-top:5px">When urges cluster across the full range.</div>
      ${hourHistogram(uByHour,{})}
    </div></div>

    <!-- Tag frequency -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Urges \u00b7 Tags</div>
      <div class="sub-ttl" style="margin-top:14px">Triggers</div>
      ${tagBars(uTopTrig)}
      <div class="sub-ttl">Feelings</div>
      ${tagBars(uTopFeel)}
      <div class="sub-ttl">Qualities</div>
      ${tagBars(uTopQual)}
    </div></div>`}

    <!-- Training -->
    <div class="card" style="margin-bottom:14px"><div class="cp">
      <div class="stat-ttl">Training</div>
      <div class="stat-val">${liftN+cardN}<span style="font-size:13px;color:var(--muted);font-weight:400"> session${liftN+cardN!==1?'s':''}</span></div>
      <div class="stat-sub">${liftN} lift \u00b7 ${cardN} cardio</div>
      <div style="margin-top:14px">${trainingHeatmap(heatDays)}</div>
      <div class="heat-legend">
        <span>Less</span>
        <span class="sq" style="background:var(--surface)"></span>
        <span class="sq" style="background:var(--accent);opacity:0.5"></span>
        <span class="sq" style="background:var(--accent)"></span>
        <span>More</span>
      </div>
    </div></div>

    <p class="hint" style="text-align:center;line-height:1.55;margin-top:4px;padding:0 12px 8px">
      Patterns over time matter more than any single day. Give it a few weeks before drawing conclusions.
    </p>`;
}

// ── Urges ────────────────────────────────────────────────────────────────
const URGE_TRIGGERS=['transition','morning','bedtime','alone','phone-pickup','saw-trigger','idle','procrastinating','post-alcohol'];
const URGE_FEELINGS=['anxious','bored','lonely','stressed','sad','restless','tired','numb','fine'];
const URGE_QUALITIES=['extend-good','escape-bad','specific-craving','diffuse','intrusive','ritual','physical','mental'];
const URGE_ACTIONS=['surfed','acted','partial','replace'];
const URGE_ACTION_LBL={surfed:'Surfed',acted:'Acted',partial:'Partial',replace:'Replace'};
const URGE_ACTION_COLORS={surfed:'#a5b4fc',acted:'#fb923c',partial:'#c084fc',replace:'#34d399'};
const URGE_INTENSITY_LBL=['Mild','Medium','Strong'];

function getUrges(ds){
  const raw=LS.get('t:urge:'+ds);
  return Array.isArray(raw)?raw:[];
}
function saveUrges(ds,arr){LS.set('t:urge:'+ds,arr);scheduleGistPush();}
function delUrge(ds,idx){
  const arr=getUrges(ds);
  if(arr[idx]!=null){
    arr.splice(idx,1);
    saveUrges(ds,arr);
    renderDaily();
  }
}
// Ensures every urge key holds an array (idempotent; handles future field migrations)
function migrateUrges(){
  LS.keys('t:urge:').forEach(k=>{
    const raw=LS.get(k);
    if(!Array.isArray(raw))LS.set(k,[]);
  });
}

// ── Urge modal ───────────────────────────────────────────────────────────
function openUrgeModal(editIdx){
  if(typeof editIdx==='number'){
    const urges=getUrges(S.dailyDate);
    const u=urges[editIdx];
    if(!u){openUrgeModal();return;}
    const t=new Date(u.ts);
    const hh=String(t.getHours()).padStart(2,'0');
    const mm=String(t.getMinutes()).padStart(2,'0');
    S.urgeModal={
      time:`${hh}:${mm}`,
      intensity:u.intensity||2,
      triggers:[...(u.triggers||[])],
      feelings:[...(u.feelings||[])],
      quality:[...(u.quality||[])],
      action:u.action||'surfed',
      note:u.note||'',
      editIdx:editIdx
    };
  }else{
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0');
    const mm=String(now.getMinutes()).padStart(2,'0');
    S.urgeModal={
      time:`${hh}:${mm}`,
      intensity:2,
      triggers:[],feelings:[],quality:[],
      action:'surfed',
      note:'',
      editIdx:null
    };
  }
  renderUrgeModal();
}
function setUrgeTimeAgo(mins){
  if(!S.urgeModal)return;
  const d=new Date(Date.now()-mins*60000);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  S.urgeModal.time=`${hh}:${mm}`;
  renderUrgeModal();
}
function closeUrgeModal(){
  S.urgeModal=null;
  const el=document.getElementById('modal-urge');
  el.classList.add('hidden');
  el.innerHTML='';
}
function setUrgeField(field,value){
  if(!S.urgeModal)return;
  S.urgeModal[field]=value;
  // Only re-render for fields that affect visual state (chips, action, intensity)
  if(field==='intensity'||field==='action')renderUrgeModal();
}
function toggleChip(group,value){
  const m=S.urgeModal;if(!m)return;
  const arr=m[group];
  const idx=arr.indexOf(value);
  if(idx>=0){arr.splice(idx,1);}
  else if(arr.length<3){arr.push(value);}
  else return;
  renderUrgeModal();
}
function saveUrge(){
  const m=S.urgeModal;if(!m)return;
  const ds=S.dailyDate;
  const [hh,mm]=(m.time||'12:00').split(':').map(Number);
  const dt=parseD(ds);
  dt.setHours(hh||0,mm||0,0,0);
  // Capture note from DOM (it doesn't re-render on every keystroke)
  const noteEl=document.getElementById('urge-note-inp');
  const note=noteEl?noteEl.value.slice(0,200):(m.note||'');
  const urge={
    ts:dt.toISOString(),
    intensity:m.intensity,
    triggers:[...m.triggers],
    feelings:[...m.feelings],
    quality:[...m.quality],
    action:m.action,
    note:note
  };
  const arr=getUrges(ds);
  if(m.editIdx!=null&&arr[m.editIdx]!=null){
    arr.splice(m.editIdx,1,urge);
  }else{
    arr.push(urge);
  }
  arr.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
  saveUrges(ds,arr);
  closeUrgeModal();
  renderDaily();
}
function renderUrgeModal(){
  const modal=document.getElementById('modal-urge');
  const m=S.urgeModal;
  if(!m){modal.classList.add('hidden');modal.innerHTML='';return;}
  // Preserve note field value across re-renders
  const existingNote=document.getElementById('urge-note-inp');
  if(existingNote)m.note=existingNote.value;
  const chips=(group,options)=>options.map(o=>{
    const selected=m[group].includes(o);
    const disabled=!selected&&m[group].length>=3;
    return`<button class="chip${selected?' sel':''}${disabled?' dis':''}" onclick="toggleChip('${group}','${o}')">${o}</button>`;
  }).join('');
  modal.innerHTML=`<div class="m-box">
    <div class="m-hd"><h3>${m.editIdx!=null?'Edit urge':'Log urge'}</h3>
      <button class="btn btn-s" onclick="closeUrgeModal()">Close</button>
    </div>

    <div class="m-field">
      <div class="field-ttl">Time</div>
      <div class="time-chips">
        <button class="chip-sm" onclick="setUrgeTimeAgo(0)">Now</button>
        <button class="chip-sm" onclick="setUrgeTimeAgo(15)">15m ago</button>
        <button class="chip-sm" onclick="setUrgeTimeAgo(30)">30m ago</button>
        <button class="chip-sm" onclick="setUrgeTimeAgo(60)">1h ago</button>
        <button class="chip-sm" onclick="setUrgeTimeAgo(120)">2h ago</button>
      </div>
      <input type="time" class="time-inp" value="${m.time}" onchange="setUrgeField('time',this.value)">
    </div>

    <div class="m-field">
      <div class="field-ttl">Intensity</div>
      <div class="seg">
        ${URGE_INTENSITY_LBL.map((lbl,i)=>
          `<button class="${m.intensity===i+1?'sel':''}" onclick="setUrgeField('intensity',${i+1})">${lbl}</button>`
        ).join('')}
      </div>
    </div>

    <div class="m-field">
      <div class="field-ttl">Trigger<span class="field-hint">optional \u00b7 max 3</span></div>
      <div class="chip-row">${chips('triggers',URGE_TRIGGERS)}</div>
    </div>

    <div class="m-field">
      <div class="field-ttl">Feeling<span class="field-hint">optional \u00b7 max 3</span></div>
      <div class="chip-row">${chips('feelings',URGE_FEELINGS)}</div>
    </div>

    <div class="m-field">
      <div class="field-ttl">Quality<span class="field-hint">optional \u00b7 max 3</span></div>
      <div class="chip-row">${chips('quality',URGE_QUALITIES)}</div>
    </div>

    <div class="m-field">
      <div class="field-ttl">Action</div>
      <div class="seg">
        ${URGE_ACTIONS.map(a=>
          `<button class="${m.action===a?'sel':''}" onclick="setUrgeField('action','${a}')">${URGE_ACTION_LBL[a]}</button>`
        ).join('')}
      </div>
    </div>

    <div class="m-field">
      <div class="field-ttl">Note<span class="field-hint">optional</span></div>
      <textarea id="urge-note-inp" class="note-inp" maxlength="200" placeholder="Context, what you did, etc." oninput="S.urgeModal&&(S.urgeModal.note=this.value)">${esc(m.note||'')}</textarea>
    </div>

    <button class="btn btn-p btn-w" onclick="saveUrge()" style="margin-top:4px">Save</button>
  </div>`;
  modal.classList.remove('hidden');
  modal.onclick=e=>{if(e.target===modal)closeUrgeModal();};
}

// ── Urge data viz ────────────────────────────────────────────────────────
function stackedBarChart(byDay,opts){
  const{w=300,h=100}=opts||{};
  const dates=Object.keys(byDay).sort();
  if(!dates.length)return emptyNote();
  const xMin=parseD(dates[0]).getTime();
  const xMax=parseD(dates[dates.length-1]).getTime();
  const xRange=Math.max(1,xMax-xMin);
  const totals=dates.map(d=>URGE_ACTIONS.reduce((s,a)=>s+(byDay[d]?.[a]||0),0));
  const maxTotal=Math.max(1,...totals);
  const pX=8,pT=8,pB=8;
  const pW=w-pX*2,pH=h-pT-pB;
  const tX=x=>pX+((x-xMin)/xRange)*pW;
  const barW=Math.min(8,Math.max(3,Math.floor(pW/Math.max(dates.length,14))));
  const bars=dates.map(d=>{
    const cx=tX(parseD(d).getTime())-barW/2;
    let yOff=pT+pH;
    return URGE_ACTIONS.map(a=>{
      const c=byDay[d]?.[a]||0;
      if(!c)return'';
      const segH=(c/maxTotal)*pH;
      yOff-=segH;
      return`<rect x="${cx.toFixed(1)}" y="${yOff.toFixed(1)}" width="${barW}" height="${segH.toFixed(1)}" fill="${URGE_ACTION_COLORS[a]}"/>`;
    }).join('');
  }).join('');
  return`<svg viewBox="0 0 ${w} ${h}" class="chart">${bars}</svg>`;
}

function hourHistogram(byHour,opts){
  const{w=300,h=90}=opts||{};
  const max=Math.max(1,...byHour);
  const pX=8,pT=8,pB=18;
  const pW=w-pX*2,pH=h-pT-pB;
  const gap=1;
  const barW=(pW-23*gap)/24;
  const bars=byHour.map((c,hr)=>{
    const x=pX+hr*(barW+gap);
    const barH=(c/max)*pH;
    const y=pT+pH-barH;
    return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="1" fill="var(--accent-text)"/>`;
  }).join('');
  const labels=[0,6,12,18].map(hr=>{
    const x=pX+hr*(barW+gap)+barW/2;
    const y=pT+pH+12;
    return`<text x="${x.toFixed(1)}" y="${y}" fill="var(--hint)" font-size="9" text-anchor="middle" font-family="-apple-system,sans-serif">${hr}:00</text>`;
  }).join('');
  return`<svg viewBox="0 0 ${w} ${h}" class="chart">${bars}${labels}</svg>`;
}

function tagBars(entries,showMax){
  showMax=showMax||5;
  if(!entries.length)return'<div class="hint" style="padding:4px 0">\u2014</div>';
  const top=entries.slice(0,showMax);
  const maxC=top[0][1];
  return top.map(([tag,c])=>{
    const pct=(c/maxC*100).toFixed(1);
    return`<div class="tag-bar">
      <span class="tag-bar-lbl">${tag}</span>
      <div class="tag-bar-bg"><div class="tag-bar-fill" style="width:${pct}%"></div></div>
      <span class="tag-bar-n">${c}</span>
    </div>`;
  }).join('');
}
